        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSfx(type) {
            initAudioContext();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.08); 
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.35);
            } else if (type === 'incorrect') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(90, audioCtx.currentTime); 
                osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.25);
            }
        }

        function shuffle(array) {
            let shuffled = array.map(q => ({...q}));
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

                levelDisplayEl.style.color = "#f3e8ff";
            } else if (currentLevelNumber <= 6) {
                levelDisplayEl.style.backgroundColor = "#701a75";
                levelDisplayEl.style.color = "#fdf4ff";
            } else if (currentLevelNumber <= 9) {
                levelDisplayEl.style.backgroundColor = "#831843";
                levelDisplayEl.style.color = "#fff1f2";
            } else {
                levelDisplayEl.style.backgroundColor = "#991b1b";
                levelDisplayEl.style.color = "#fef2f2";
            }

            let currentQuiz = quizSessionList[currentQuestionIndex];
            questionEl.textContent = currentQuiz.question;

                const button = document.createElement("button");
                button.classList.add("option-btn");
                button.textContent = option;
                button.addEventListener("click", () => selectOption(button, index));

            }

            let correctAnswerIndex = quizSessionList[currentQuestionIndex].answer;
            const allButtons = optionsContainer.querySelectorAll(".option-btn");

            allButtons.forEach(btn => btn.disabled = true);

            if (selectedIndex === correctAnswerIndex) {
                selectedButton.classList.add("correct");
                playSfx('correct');
                score += pointsPerQuestion; 
                scoreDisplayEl.textContent = `Score: ${score}`;
            } else {
                selectedButton.classList.add("incorrect");
                allButtons[correctAnswerIndex].classList.add("correct");
                playSfx('incorrect');
            }

            nextButton.disabled = false;
        }

        function nextQuestion() {
            currentQuestionIndex++;

            if (currentQuestionIndex < totalQuestionsCount) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizBox.classList.add("hide");
            resultBox.classList.remove("hide");
            finalScoreEl.textContent = score;
        }

        function restartQuiz() {
            resultBox.classList.add("hide");
            quizBox.classList.remove("hide");
            buildLeveledSession();
        }

        buildLeveledSession();
    </script>
</body>
</html>
